<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyJudge</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">▶</div>
    <div>
      <div class="logo-text">AlgoJudge</div>
      <div class="logo-sub">Python 알고리즘 테스터</div>
    </div>
  </div>
  <div id="status-bar">
    <div class="status-dot loading" id="status-dot"></div>
    <span id="status-text">파이썬 엔진 로딩 중...</span>
  </div>
</header>

<main>
  <!-- Code Panel -->
  <div class="code-panel">
    <div class="panel-header">
      <div class="panel-tabs">
        <div class="tab active">solution.py</div>
      </div>
      <span style="font-size:11px;color:var(--muted)">Ctrl+Enter = 실행</span>
    </div>
    <div id="code-editor-wrap"></div>
    <div class="code-toolbar">
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="clearCode()">초기화</button>
        <button class="btn btn-ghost btn-sm" onclick="loadTemplate()">템플릿</button>
      </div>
      <button class="btn btn-primary" id="run-btn" onclick="runAllTests()" disabled>
        <span id="run-icon">▶</span> 전체 실행
      </button>
    </div>
  </div>

  <!-- Testcase Panel -->
  <div class="testcase-panel">
    <div class="panel-header">
      <span>테스트 케이스</span>
      <span id="tc-count" style="color:var(--accent)">0개</span>
    </div>

    <div class="testcase-list" id="testcase-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📋</div>
        <div>테스트 케이스가 없습니다</div>
        <div style="font-size:11px;">아래 버튼으로 추가해보세요</div>
      </div>
    </div>

    <button class="add-tc-btn" onclick="addTestCase()">
      <span>+</span> 테스트 케이스 추가
    </button>

    <div class="result-summary">
      <div class="summary-text">
        <span class="summary-label">결과</span>
        <span class="summary-score" id="summary-score" style="color:var(--muted)">—</span>
      </div>
      <div class="summary-bar">
        <div class="summary-fill" id="summary-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="output-panel">
      <div class="panel-header">
        <span>실행 로그</span>
        <button class="btn btn-ghost btn-sm" onclick="clearLog()">지우기</button>
      </div>
      <div class="output-body" id="output-log">파이썬 엔진 준비 중...</div>
    </div>
  </div>
</main>

<div class="toast-container" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
<script src="app.js"></script>
</body>
</html>
